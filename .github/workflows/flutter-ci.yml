name: Flutter Desktop CI

on:
  push:
    branches: [main, develop]
    paths:
      - "desktop/flutter_agentgpt/**"
      - ".github/workflows/flutter-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "desktop/flutter_agentgpt/**"

defaults:
  run:
    working-directory: desktop/flutter_agentgpt

env:
  FLUTTER_VERSION: "3.24.0"

jobs:
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart format check
        run: dart format --set-exit-if-changed .

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: desktop/flutter_agentgpt/coverage/lcov.info
          retention-days: 14

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebot-windows-${{ github.sha }}
          path: desktop/flutter_agentgpt/build/windows/x64/runner/Release/
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebot-linux-${{ github.sha }}
          path: desktop/flutter_agentgpt/build/linux/x64/release/bundle/
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: rebot-windows-${{ github.sha }}
          path: release/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: rebot-linux-${{ github.sha }}
          path: release/linux

      - name: Package artifacts
        run: |
          cd release
          zip -r rebot-windows.zip windows/
          tar czf rebot-linux.tar.gz linux/

      - name: Generate build tag
        id: tag
        run: echo "tag=v0.1.0-$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Rebot ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            release/rebot-windows.zip
            release/rebot-linux.tar.gz
