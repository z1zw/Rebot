name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "rebot/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "rebot/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-quality:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Repo hygiene gate
        run: python scripts/check_repo_hygiene.py

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Compile check
        run: |
          python -m compileall -q backend/app
          python -m compileall -q rebot

      - name: Run backend tests
        run: pytest -q backend/tests

  runtime-baseline:
    name: Runtime Baseline Gate (Docker)
    runs-on: ubuntu-latest
    needs: backend-quality
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Build backend runtime image
        run: docker build -f backend/Dockerfile -t rebot-backend-ci .

      - name: Verify runtime tools
        run: |
          docker run --rm rebot-backend-ci python --version
          docker run --rm rebot-backend-ci node --version
          docker run --rm rebot-backend-ci npm --version
          docker run --rm rebot-backend-ci flutter --version
          docker run --rm rebot-backend-ci dart --version

      - name: Verify framework preflight matrix
        run: |
          docker run --rm rebot-backend-ci python -c "from app.core.runtime_baseline import collect_runtime_baseline; b=collect_runtime_baseline(include_versions=False); assert b['frameworks']['html']['ready']; assert b['frameworks']['react']['ready']; assert b['frameworks']['vue']['ready']; assert b['frameworks']['flutter']['ready']; print('baseline-ok')"
